<!DOCTYPE html>
<html>
<head>
    <title>BGSCET - Reset Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #FF6B00, #FF8C00);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .logo { font-size: 50px; margin-bottom: 10px; }
        h2 { color: #FF6B00; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: #FF6B00; }
        .otp-input {
            font-size: 24px;
            text-align: center;
            letter-spacing: 10px;
            border: 2px solid #FF6B00;
        }
        button {
            width: 100%;
            padding: 13px;
            background: #FF6B00;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #e55c00; }
        .error {
            background: #ffe0e0;
            color: #c0392b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .back { margin-top: 15px; font-size: 14px; }
        .back a { color: #FF6B00; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔑</div>
        <h2>Reset Password</h2>
        <p>Enter the OTP sent to your email and set a new password!</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input class="otp-input" type="text" name="otp" maxlength="6" placeholder="000000" required/>
            <input type="password" name="new_password" placeholder="New Password" required/>
            <button type="submit">Reset Password</button>
        </form>
        <div class="back"><a href="/login">← Back to Login</a></div>
    </div>
</body>
</html>
