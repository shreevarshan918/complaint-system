<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #4CAF50;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px;
        }
        .content {
            padding: 40px;
        }
        .cards {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }
        .card:hover {
            background-color: #4CAF50;
            color: white;
        }
        .card h2 {
            font-size: 40px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <b>🎓 Complaint System</b>
        <div>
            <span>Welcome, {{ name }}!</span>
            <a href="/logout">Logout</a>
        </div>
    </div>
    <div class="content">
        <h2>What would you like to do?</h2>
        <div class="cards">
            <a href="/raise_complaint" class="card">
                <h2>📝</h2>
                <p>Raise a Complaint</p>
            </a>
            <a href="/my_complaints" class="card">
                <h2>📋</h2>
                <p>My Complaints</p>
            </a>
        </div>
    </div>
</body>
</html>
