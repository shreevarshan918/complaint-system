<!DOCTYPE html>
<html>
<head>
    <title>BGSCET - Verify OTP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #FF6B00, #FF8C00);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .logo { font-size: 50px; margin-bottom: 10px; }
        h2 { color: #FF6B00; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .otp-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 10px;
            border: 2px solid #FF6B00;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 13px;
            background: #FF6B00;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #e55c00; }
        .error {
            background: #ffe0e0;
            color: #c0392b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .debug {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .back { margin-top: 15px; font-size: 14px; }
        .back a { color: #FF6B00; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📧</div>
        <h2>Verify Your Email</h2>
        <p>We sent a 6-digit OTP to your college email. Enter it below!</p>
        {% if debug_otp %}
        <div class="debug">
            Email could not be sent. Your OTP is: <b>{{ debug_otp }}</b>
        </div>
        {% endif %}
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input class="otp-input" type="text" name="otp" maxlength="6" placeholder="000000" required autofocus/>
            <button type="submit">Verify OTP</button>
        </form>
        <div class="back"><a href="/register">← Back to Register</a></div>
    </div>
</body>
</html>
