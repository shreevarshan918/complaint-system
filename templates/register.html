<!DOCTYPE html>
<html>
<head>
    <title>Complaint System - Register</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        p {
            text-align: center;
        }
        a {
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>🎓 Complaint System</h2>
        <h3 style="text-align:center">Register</h3>
        <form action="/register" method="POST">
            <input type="text" name="name" placeholder="Your Full Name" required/>
            <input type="email" name="email" placeholder="Your College Email" required/>
            <input type="password" name="password" placeholder="Create Password" required/>
            <input type="text" name="roll_no" placeholder="Your Roll Number" required/>
            <select name="year" required>
                <option value="">Select Your Semester</option>
                <option value="1st sem">1st Semester</option>
                <option value="2nd sem">2nd Semester</option>
                <option value="3rd sem">3rd Semester</option>
                <option value="4th sem">4th Semester</option>
                <option value="5th sem">5th Semester</option>
                <option value="6th sem">6th Semester</option>
                <option value="7th sem">7th Semester</option>
                <option value="8th sem">8th Semester</option>
            </select>
            <select name="department" required>
                <option value="">Select Your Department</option>
                <option value="CSE">CSE</option>
                <option value="ECE">ECE</option>
                <option value="ME">ME</option>
                <option value="CE">CE</option>
                <option value="EEE">EEE</option>
            </select>
            <button type="submit">Register</button>
        </form>
        <p>Already registered? <a href="/login">Login here</a></p>
    </div>
</body>
</html>
